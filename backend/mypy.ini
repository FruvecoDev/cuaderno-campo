# mypy configuration for FRUVECO backend.
#
# Estrategia: gradual/progressive typing.
#   - Los módulos NO listados usan defaults muy relajados (compatible con el
#     código existente sin type hints).
#   - Los módulos ya migrados a type hints activan --strict individualmente
#     para evitar regresiones ("promesa de tipos" en esos archivos).
#
# Uso local:
#   cd /app/backend && mypy database.py models.py server.py
#
# Para añadir un módulo migrado: crear una sección [mypy-<modulo>] con strict=True.

[mypy]
python_version = 3.11
warn_unused_ignores = True
warn_redundant_casts = True
show_error_codes = True
pretty = True

# Third-party sin stubs oficiales — silenciamos "cannot find implementation"
ignore_missing_imports = True

# Defaults RELAJADOS para el resto del código legacy
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
no_implicit_optional = False

# Al chequear strict-modules, los imports legacy no deben propagar errores.
# `silent` los sigue para tipar correctamente pero no reporta sus fallos.
follow_imports = silent

# ---------------------------------------------------------------------------
# Módulos migrados a strict typing (2026-02)
# ---------------------------------------------------------------------------

[mypy-database]
strict = True
# motor no expone stubs completos; permitimos Any en retornos de colecciones
disallow_any_generics = False
warn_return_any = False

[mypy-models]
strict = True
# Pydantic + ObjectId requiere flexibilidad en validate()
disallow_any_generics = False
warn_return_any = False

[mypy-server]
strict = True
# FastAPI decorators consumen callables Any-tipados internamente
disallow_untyped_decorators = False
warn_return_any = False
# Llamadas a schedulers/RRHH legacy sin type hints todavía
disable_error_code = no-untyped-call
